name: Bug report
description: Something is broken or behaves incorrectly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in the fields below — vague reports
        get closed during triage.
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag, branch, or commit SHA where the bug reproduces.
      placeholder: "v1.2.3 or abc1234"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Include commands and inputs.
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / CI run URL
      description: Paste error output or link to a failing GitHub Actions run.
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, runtime, runner type, etc."
  - type: checkboxes
    id: terms
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
