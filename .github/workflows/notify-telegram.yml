name: Reusable Telegram Notify

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: "success | failure | cancelled"
      title:
        required: false
        type: string
        default: "CI/CD"
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Telegram Notify
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          TITLE: ${{ inputs.title }}
          STATUS: ${{ inputs.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "${STATUS}" in
            success)   ICON="✅"; LABEL="SUCCESS" ;;
            failure)   ICON="❌"; LABEL="FAILED" ;;
            cancelled) ICON="⚠️"; LABEL="CANCELLED" ;;
            *)         ICON="ℹ️"; LABEL="${STATUS}" ;;
          esac
          esc() { printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }
          REPO_E=$(esc "${REPO}")
          BRANCH_E=$(esc "${BRANCH}")
          TITLE_E=$(esc "${TITLE}")
          LABEL_E=$(esc "${LABEL}")
          TEXT="${ICON} <b>${TITLE_E} ${LABEL_E}</b>
          Repo: <code>${REPO_E}</code>
          Branch: <code>${BRANCH_E}</code>
          <a href=\"${RUN_URL}\">Xem run</a>"
          curl -fsS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
