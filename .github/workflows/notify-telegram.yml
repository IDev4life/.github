name: Reusable Telegram Notify

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: "success | failure | cancelled"
      title:
        required: false
        type: string
        default: "CI/CD"
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Telegram Notify
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          TITLE: ${{ inputs.title }}
          STATUS: ${{ inputs.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "${STATUS}" in
            success)   ICON="✅"; LABEL="SUCCESS" ;;
            failure)   ICON="❌"; LABEL="FAILED" ;;
            cancelled) ICON="⚠️"; LABEL="CANCELLED" ;;
            *)         ICON="ℹ️"; LABEL="${STATUS}" ;;
          esac
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${ICON} *${TITLE} ${LABEL}*%0ARepo: \`${REPO}\`%0ABranch: \`${BRANCH}\`%0A[Xem run](${RUN_URL})"
