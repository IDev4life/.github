name: Reusable Validate

on:
  workflow_call:
    inputs:
      shared_ref:
        required: false
        type: string
        default: "main"
        description: >
          Ref (branch/tag/SHA) of IDev4life/.github to load shared validate
          scripts and markdownlint config from. Defaults to 'main'; pin to a
          tag for reproducible builds.
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: validate-${{ github.workflow }}-${{ github.event.repository.full_name }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6.0.2

      - name: Checkout shared validate scripts
        uses: actions/checkout@v6.0.2
        with:
          repository: IDev4life/.github
          ref: ${{ inputs.shared_ref }}
          path: _shared
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: python -m pip install --disable-pip-version-check "pyyaml==6.0.3"

      - name: Validate marketplace.json
        env:
          PYTHONPATH: _shared/scripts
        run: python _shared/scripts/validate_marketplace.py

      - name: Validate plugin.json files
        env:
          PYTHONPATH: _shared/scripts
        run: python _shared/scripts/validate_plugin_json.py

      - name: Validate SKILL.md / command frontmatter
        env:
          PYTHONPATH: _shared/scripts
        run: python _shared/scripts/validate_frontmatter.py

      - name: Validate SKILL references
        env:
          PYTHONPATH: _shared/scripts
        run: python _shared/scripts/validate_skill_references.py

      - name: Validate README links
        env:
          PYTHONPATH: _shared/scripts
        run: python _shared/scripts/validate_readme_links.py

      - name: Setup Node for markdownlint
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Markdown lint
        run: >
          npx --yes markdownlint-cli2@0.22.1
          --config _shared/config/markdownlint.jsonc
          "**/*.md" "#node_modules" "#_shared"

  notify:
    needs: validate
    if: always()
    uses: IDev4life/.github/.github/workflows/notify-telegram.yml@main
    with:
      status: ${{ needs.validate.result }}
      title: "VALIDATE"
    secrets: inherit
