name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5.0.0
        with:
          # Dùng PAT vì GITHUB_TOKEN mặc định không được phép tạo PR trên
          # org free plan (setting Actions → Workflow permissions bị khoá).
          # PAT cần quyền: Contents RW, Pull requests RW, Issues RW.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
