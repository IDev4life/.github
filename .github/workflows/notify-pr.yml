name: Notify PR

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: notify-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Telegram Notify
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          TITLE: ${{ github.event.pull_request.title }}
          URL: ${{ github.event.pull_request.html_url }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          set -euo pipefail
          case "${ACTION}" in
            opened)   ICON="🔔"; STATUS="OPENED" ;;
            reopened) ICON="🔄"; STATUS="REOPENED" ;;
            closed)
              if [ "${MERGED}" = "true" ]; then
                ICON="✅"; STATUS="MERGED"
              else
                ICON="❌"; STATUS="CLOSED"
              fi ;;
            *) ICON="ℹ️"; STATUS="${ACTION}" ;;
          esac
          esc() { printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }
          REPO_E=$(esc "${REPO}")
          TITLE_E=$(esc "${TITLE}")
          AUTHOR_E=$(esc "${AUTHOR}")
          STATUS_E=$(esc "${STATUS}")
          TEXT="${ICON} <b>PR ${STATUS_E}</b>
          Repo: <code>${REPO_E}</code>
          Title: <code>${TITLE_E}</code>
          By: <code>${AUTHOR_E}</code>
          <a href=\"${URL}\">Xem PR</a>"
          curl -fsS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
