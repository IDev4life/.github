name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "Tên image, ví dụ: IDev4life/my-app"
      dockerfile_path:
        required: false
        type: string
        default: "./Dockerfile"
      build_target:
        required: false
        type: string
        default: "production"
      registry:
        required: false
        type: string
        default: "ghcr.io"
    secrets:
      REGISTRY_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: docker-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ inputs.registry }}/${{ inputs.image_name }}:${{ github.sha }}
            ${{ inputs.registry }}/${{ inputs.image_name }}:latest
          target: ${{ inputs.build_target }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: build
    if: always()
    uses: IDev4life/.github/.github/workflows/notify-telegram.yml@main
    with:
      status: ${{ needs.build.result }}
      title: "BUILD"
    secrets: inherit
